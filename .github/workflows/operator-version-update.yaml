name: Update CSM-Operator version
# reusable workflow
on:  # yamllint disable-line rule:truthy
  workflow_dispatch:
    inputs:
      latest-version:
        description: 'Version to update operator, ex: v2.0.0'
        required: true
      existing-version:
        description: 'Existing operator version, ex: v1.0.0'
        required: true
jobs:
  version-update:
    uses: dell/common-github-actions/.github/workflows/operator-version-update.yaml@operator-version-update-action
    name: Operator version update
    with:
      version: ${{ github.event.inputs.latest-version }}
      image: ${{ github.event.inputs.existing-version }}
    secrets: inherit
